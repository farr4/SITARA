<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin | SITARA</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <section class="login-page">

    <div class="login-card">

      <div class="login-header">
        <h1>SITARA</h1>
        <p>
          Sistem Informasi Transparansi Infrastruktur dan Aspirasi Rakyat
        </p>
      </div>

      <form id="login-form" class="login-form">

        <div class="input-group">
          <label>Email</label>
          <input
            type="email"
            id="email"
            placeholder="admin@sitara.id"
            required
          >
        </div>

        <div class="input-group">
          <label>Password</label>
          <input
            type="password"
            id="password"
            placeholder="••••••••"
            required
          >
        </div>

        <button
          type="submit"
          class="button button-primary"
        >
          Masuk
        </button>

      </form>

    </div>

  </section>

  <script src="js/login.js"></script>

</body>
</html>
