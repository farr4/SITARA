    </div>

      <p id="modal-message">
      </p>

    </div>

    <div class="modal-footer">

      <button
        class="button button-secondary"
        id="modal-cancel"
      >
        Batal
      </button>

      <button
        class="button button-primary"
        id="modal-ok"
      >
        OK
      </button>

    </div>

  </div>
